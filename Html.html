<!DOCTYPE html>
<html>
<head>
  <title>Blackjack Game</title>
  <link rel="stylesheet" type="text/css" href="style.css">
</head>
<body>
  <h1>Blackjack Game</h1>
  <div id="game-container">
    <div id="player-hand">
      <h2>Player</h2>
      <div id="player-cards">
        <!-- <img src="#1" alt="Player Card 1">
        <img src="#2" alt="Player Card 2">
        <img src="#3" alt="Player Card 3">
        <img src="#4" alt="Player Card 4">
        <img src="#5" alt="Player Card 5"> -->
      </div>
      <p id="player-score">Score: 0</p>
    </div>
    <div id="dealer-hand">
      <h2>Dealer</h2>
      <div id="dealer-cards">
        <!-- <img src="#6" alt="Dealer Card 1">
        <img src="#7" alt="Dealer Card 2">
        <img src="#8" alt="Dealer Card 3">
        <img src="#9" alt="Dealer Card 4">
        <img src="#10" alt="Dealer Card 5"> -->
      </div>
      <p id="dealer-score">Score: 0</p>
    </div>
    <button id="hit-button">Hit</button>
    <button id="stand-button">Stand</button>
    <button id="deal-button">Deal</button>
  </div>
  
  <script src="script.js"></script>
</body>
</html>
